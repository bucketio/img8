<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">电脑变卡原因封面</title>
  <desc id="desc">电脑变卡通常由后台程序、硬盘空间、软件堆叠、内存和散热共同造成</desc>
  <rect width="1200" height="820" fill="#f8fafc"/>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <text x="70" y="100" fill="#111827" font-size="50" font-weight="700">电脑为什么会越用越卡？</text>
    <text x="72" y="154" fill="#475569" font-size="25">不是电脑突然变笨，而是多个负担叠在了一起</text>
    <g transform="translate(345 230)">
      <rect width="510" height="310" rx="24" fill="#111827"/>
      <rect x="28" y="30" width="454" height="230" rx="12" fill="#e5e7eb"/>
      <rect x="58" y="60" width="165" height="28" rx="7" fill="#94a3b8"/>
      <rect x="58" y="110" width="394" height="28" rx="7" fill="#cbd5e1"/>
      <rect x="58" y="160" width="320" height="28" rx="7" fill="#cbd5e1"/>
      <rect x="58" y="210" width="245" height="28" rx="7" fill="#cbd5e1"/>
      <rect x="200" y="310" width="110" height="58" fill="#374151"/>
      <rect x="145" y="368" width="220" height="24" rx="12" fill="#111827"/>
    </g>
    <g transform="translate(92 590)">
      <rect width="205" height="108" rx="18" fill="#ffffff" stroke="#d1d5db"/>
      <circle cx="52" cy="54" r="26" fill="#2563eb"/>
      <text x="52" y="64" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700">启</text>
      <text x="92" y="48" fill="#111827" font-size="24" font-weight="700">自启太多</text>
      <text x="92" y="80" fill="#64748b" font-size="18">开机就忙</text>
    </g>
    <g transform="translate(335 590)">
      <rect width="205" height="108" rx="18" fill="#ffffff" stroke="#d1d5db"/>
      <circle cx="52" cy="54" r="26" fill="#0f766e"/>
      <text x="52" y="64" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700">盘</text>
      <text x="92" y="48" fill="#111827" font-size="24" font-weight="700">空间太满</text>
      <text x="92" y="80" fill="#64748b" font-size="18">缓存没地方</text>
    </g>
    <g transform="translate(578 590)">
      <rect width="205" height="108" rx="18" fill="#ffffff" stroke="#d1d5db"/>
      <circle cx="52" cy="54" r="26" fill="#7c3aed"/>
      <text x="52" y="64" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700">软</text>
      <text x="92" y="48" fill="#111827" font-size="24" font-weight="700">软件堆叠</text>
      <text x="92" y="80" fill="#64748b" font-size="18">组件常驻</text>
    </g>
    <g transform="translate(821 590)">
      <rect width="285" height="108" rx="18" fill="#ffffff" stroke="#d1d5db"/>
      <circle cx="52" cy="54" r="26" fill="#dc2626"/>
      <text x="52" y="64" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700">热</text>
      <text x="92" y="48" fill="#111827" font-size="24" font-weight="700">内存与散热吃紧</text>
      <text x="92" y="80" fill="#64748b" font-size="18">多任务扛不住</text>
    </g>
  </g>
</svg>
