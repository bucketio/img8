  <rect x="50" y="258" width="48" height="3" rx="1.5" fill="#1a6bff"/>
  
  <text x="910" y="370" text-anchor="end" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="#94a3b8">清源智界 · 獴探</text>
