    <circle cx="880" cy="180" r="5" fill="#1a6bff"/>
    <circle cx="850" cy="320" r="5" fill="#1a6bff"/>
    <circle cx="780" cy="370" r="5" fill="#1a6bff"/>
    <circle cx="700" cy="380" r="5" fill="#1a6bff"/>
    
    <line x1="820" y1="60" x2="700" y2="380" stroke="#1a6bff" stroke-width="0.8"/>
    <line x1="880" y1="180" x2="700" y2="380" stroke="#1a6bff" stroke-width="0.8"/>
    <line x1="850" y1="320" x2="700" y2="380" stroke="#1a6bff" stroke-width="0.8"/>
    <line x1="780" y1="370" x2="700" y2="380" stroke="#1a6bff" stroke-width="0.8"/>
  </g>
  
  <!-- Chevron -->
