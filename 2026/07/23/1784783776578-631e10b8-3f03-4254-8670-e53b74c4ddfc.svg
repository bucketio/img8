<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">银狐攻击目标</title>
  <desc id="desc">银狐瞄准 Windows 办公电脑和财务、行政、人事、销售等岗位。</desc>
  <rect width="900" height="430" fill="#ffffff"/>
  <text x="48" y="65" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#182033">目标不是破坏电脑，而是控制电脑</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="130" width="230" height="185" rx="22" fill="#edf5ff" stroke="#c9d7ef" stroke-width="3"/>
    <text x="115" y="180" font-size="25" font-weight="700" fill="#2f6bd9">办公电脑</text>
    <text x="105" y="225" font-size="20" fill="#334155">Windows 终端</text>
    <text x="105" y="260" font-size="20" fill="#334155">文件 / 账号 / 聊天</text>
    <rect x="335" y="130" width="230" height="185" rx="22" fill="#fff5df" stroke="#e7c878" stroke-width="3"/>
    <text x="375" y="180" font-size="25" font-weight="700" fill="#946200">重点岗位</text>
    <text x="370" y="225" font-size="20" fill="#334155">财务 / 行政</text>
    <text x="370" y="260" font-size="20" fill="#334155">人事 / 销售</text>
    <rect x="600" y="130" width="230" height="185" rx="22" fill="#e8f7ef" stroke="#b7e4c7" stroke-width="3"/>
    <text x="650" y="180" font-size="25" font-weight="700" fill="#24704d">后续风险</text>
    <text x="635" y="225" font-size="20" fill="#334155">窃密 / 远控</text>
    <text x="635" y="260" font-size="20" fill="#334155">诈骗 / 内网跳板</text>
  </g>
  <text x="162" y="378" font-family="Arial, sans-serif" font-size="20" fill="#5f6b80">它更像黑产工具链，不是单纯让电脑“坏掉”的病毒</text>
</svg>
