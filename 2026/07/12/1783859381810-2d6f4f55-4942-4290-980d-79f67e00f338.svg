<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">桌面整理建议</title>
  <desc id="desc">把桌面从杂乱图标整理成待处理、工作资料、照片视频和安装包几个文件夹。</desc>
  <rect width="900" height="430" fill="#fbfcff"/>
  <text x="48" y="65" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#182033">把桌面当临时工作台，不当仓库</text>
  <g transform="translate(60 125)">
    <rect x="0" y="0" width="300" height="225" rx="22" fill="#ffffff" stroke="#d9deea" stroke-width="3"/>
    <text x="42" y="46" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#a33d2e">整理前</text>
    <g fill="#e9edf5" stroke="#b8c1d1" stroke-width="2">
      <rect x="42" y="78" width="42" height="34" rx="6"/>
      <rect x="112" y="78" width="42" height="34" rx="6"/>
      <rect x="182" y="78" width="42" height="34" rx="6"/>
      <rect x="42" y="132" width="42" height="34" rx="6"/>
      <rect x="112" y="132" width="42" height="34" rx="6"/>
      <rect x="182" y="132" width="42" height="34" rx="6"/>
      <rect x="42" y="186" width="42" height="34" rx="6"/>
      <rect x="112" y="186" width="42" height="34" rx="6"/>
      <rect x="182" y="186" width="42" height="34" rx="6"/>
    </g>
  </g>
  <path d="M385 238 H495" stroke="#607089" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(520 125)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="320" height="225" rx="22" fill="#ffffff" stroke="#d9deea" stroke-width="3"/>
    <text x="42" y="46" font-size="24" font-weight="700" fill="#24704d">整理后</text>
    <rect x="42" y="78" width="104" height="48" rx="12" fill="#edf5ff"/>
    <text x="62" y="109" font-size="18" fill="#2f6bd9">待处理</text>
    <rect x="178" y="78" width="104" height="48" rx="12" fill="#e8f7ef"/>
    <text x="194" y="109" font-size="18" fill="#24704d">工作资料</text>
    <rect x="42" y="152" width="104" height="48" rx="12" fill="#fff5df"/>
    <text x="58" y="183" font-size="18" fill="#946200">照片视频</text>
    <rect x="178" y="152" width="104" height="48" rx="12" fill="#f6f7fb"/>
    <text x="204" y="183" font-size="18" fill="#334155">安装包</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#607089"/>
    </marker>
  </defs>
</svg>
