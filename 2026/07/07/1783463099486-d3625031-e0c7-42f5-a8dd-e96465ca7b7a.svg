<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <style>
      .font{font-family:"Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif}
      .h1{font-size:48px;font-weight:800;fill:#17324d}
      .cardTitle{font-size:29px;font-weight:800;fill:#17324d}
      .body{font-size:22px;fill:#42566a}
      .badge{font-size:36px;font-weight:900;fill:#fff}
    </style>
  </defs>
  <rect width="1200" height="675" fill="#fffaf1"/>
  <text x="72" y="82" class="font h1">“利益没谈妥”至少有五张账</text>
  <text x="76" y="122" class="font body">钱只是最容易被看见的一张。真正难收口的，是五张账能不能被同一份方案安放。</text>
  <g transform="translate(70 180)">
    <g>
      <rect width="198" height="335" rx="24" fill="#eaf4fb" stroke="#5795b8" stroke-width="3"/>
      <circle cx="99" cy="66" r="38" fill="#5795b8"/>
      <text x="99" y="79" text-anchor="middle" class="font badge">1</text>
      <text x="99" y="138" text-anchor="middle" class="font cardTitle">补偿账</text>
      <text x="99" y="192" text-anchor="middle" class="font body">赔偿金额</text>
      <text x="99" y="229" text-anchor="middle" class="font body">支付方式</text>
      <text x="99" y="266" text-anchor="middle" class="font body">调解或诉讼</text>
    </g>
    <g transform="translate(216 0)">
      <rect width="198" height="335" rx="24" fill="#eef8ef" stroke="#66a46a" stroke-width="3"/>
      <circle cx="99" cy="66" r="38" fill="#66a46a"/>
      <text x="99" y="79" text-anchor="middle" class="font badge">2</text>
      <text x="99" y="138" text-anchor="middle" class="font cardTitle">真相账</text>
      <text x="99" y="192" text-anchor="middle" class="font body">病历争议</text>
      <text x="99" y="229" text-anchor="middle" class="font body">术前告知</text>
      <text x="99" y="266" text-anchor="middle" class="font body">关键细节</text>
    </g>
    <g transform="translate(432 0)">
      <rect width="198" height="335" rx="24" fill="#fff1df" stroke="#d9903f" stroke-width="3"/>
      <circle cx="99" cy="66" r="38" fill="#d9903f"/>
      <text x="99" y="79" text-anchor="middle" class="font badge">3</text>
      <text x="99" y="138" text-anchor="middle" class="font cardTitle">责任账</text>
      <text x="99" y="192" text-anchor="middle" class="font body">个人责任</text>
      <text x="99" y="229" text-anchor="middle" class="font body">管理责任</text>
      <text x="99" y="266" text-anchor="middle" class="font body">刑事责任</text>
    </g>
    <g transform="translate(648 0)">
      <rect width="198" height="335" rx="24" fill="#f7eef9" stroke="#9b6ab2" stroke-width="3"/>
      <circle cx="99" cy="66" r="38" fill="#9b6ab2"/>
      <text x="99" y="79" text-anchor="middle" class="font badge">4</text>
      <text x="99" y="138" text-anchor="middle" class="font cardTitle">尊严账</text>
      <text x="99" y="192" text-anchor="middle" class="font body">名誉防御</text>
      <text x="99" y="229" text-anchor="middle" class="font body">道歉方式</text>
      <text x="99" y="266" text-anchor="middle" class="font body">二次伤害</text>
    </g>
    <g transform="translate(864 0)">
      <rect width="198" height="335" rx="24" fill="#fdeceb" stroke="#d86154" stroke-width="3"/>
      <circle cx="99" cy="66" r="38" fill="#d86154"/>
      <text x="99" y="79" text-anchor="middle" class="font badge">5</text>
      <text x="99" y="138" text-anchor="middle" class="font cardTitle">安全账</text>
      <text x="99" y="192" text-anchor="middle" class="font body">书面答复</text>
      <text x="99" y="229" text-anchor="middle" class="font body">时间表</text>
      <text x="99" y="266" text-anchor="middle" class="font body">可查询进展</text>
    </g>
  </g>
  <text x="76" y="610" class="font body">只要其中一张账没收口，事件就很难真正降温。</text>
</svg>
