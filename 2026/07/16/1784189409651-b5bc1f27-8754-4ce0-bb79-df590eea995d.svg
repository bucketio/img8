<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" width="940" height="400">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a1628"/><stop offset="0.5" stop-color="#0f1f3d"/><stop offset="1" stop-color="#162a4a"/></linearGradient>
    <radialGradient id="glow"><stop offset="0" stop-color="#1a6bff" stop-opacity="0.3"/><stop offset="1" stop-color="#1a6bff" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="940" height="400" fill="url(#bg5)"/>
  
  <!-- Network nodes -->
  <g opacity="0.6">
    <!-- Connection lines -->
    <line x1="600" y1="100" x2="720" y2="180" stroke="#1a6bff" stroke-width="0.8" opacity="0.4"/>
    <line x1="720" y1="180" x2="680" y2="300" stroke="#1a6bff" stroke-width="0.8" opacity="0.4"/>
    <line x1="680" y1="300" x2="550" y2="320" stroke="#1a6bff" stroke-width="0.8" opacity="0.4"/>
    <line x1="550" y1="320" x2="500" y2="200" stroke="#1a6bff" stroke-width="0.8" opacity="0.4"/>
    <line x1="500" y1="200" x2="600" y2="100" stroke="#1a6bff" stroke-width="0.8" opacity="0.4"/>
    <line x1="600" y1="100" x2="500" y2="200" stroke="#1a6bff" stroke-width="0.8" opacity="0.4"/>
    <line x1="720" y1="180" x2="550" y2="320" stroke="#1a6bff" stroke-width="0.8" opacity="0.3"/>
    <line x1="600" y1="100" x2="550" y2="320" stroke="#1a6bff" stroke-width="0.8" opacity="0.2"/>
    
    <!-- Nodes -->
    <circle cx="600" cy="100" r="6" fill="#1a6bff" opacity="0.8"/>
    <circle cx="720" cy="180" r="5" fill="#60a5fa" opacity="0.8"/>
    <circle cx="680" cy="300" r="6" fill="#1a6bff" opacity="0.7"/>
    <circle cx="550" cy="320" r="4" fill="#60a5fa" opacity="0.7"/>
    <circle cx="500" cy="200" r="5" fill="#1a6bff" opacity="0.8"/>
    
    <!-- Central glow node -->
    <circle cx="610" cy="200" r="40" fill="url(#glow)"/>
    <circle cx="610" cy="200" r="8" fill="#1a6bff" opacity="0.9"/>
    <circle cx="610" cy="200" r="4" fill="#fff" opacity="0.8"/>
  </g>
  
  <!-- Series label -->
  <rect x="35" y="30" width="115" height="28" rx="14" fill="#1a6bff" opacity="0.85"/>
  <text x="92" y="49" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" font-weight="bold" fill="#fff">深度连载第4篇</text>
  
  <!-- Main title -->
  <text x="50" y="115" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="28" font-weight="bold" fill="#fff">AI智能体技术</text>
  <text x="50" y="155" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="28" font-weight="bold" fill="#fff">在全过程咨询中的应用前景</text>
  
  <!-- Subtitle -->
  <text x="50" y="200" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#94a3b8">从"大模型"到"智能体"——工程咨询AI的下一次跃迁</text>
  
  <!-- Divider -->
  <line x1="50" y1="220" x2="200" y2="220" stroke="#1a6bff" stroke-width="2"/>
  
  <!-- Tags -->
  <text x="50" y="255" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#60a5fa"># 推理规划  # 工具调用  # 记忆系统  # 自我校验</text>
  
  <!-- Brand -->
  <text x="50" y="365" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#64748b">深度内容 · 每周一更新</text>
  <text x="890" y="365" text-anchor="end" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#64748b">清源智界研究院</text>
</svg>
